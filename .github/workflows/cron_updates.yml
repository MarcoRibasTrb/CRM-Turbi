name: Hourly BQ Procedures Update

on:
  schedule:
    # Roda a cada 2 horas, todos os dias (Minuto 0 das horas pares: 0, 2, 4, 6...)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Mantém o botão cinza para você testar manualmente quando quiser!

jobs:
  update-tables:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        env:
          ACTIONS_NODE_BEFORE_WARNINGS: 'quiet'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Já usando a 3.11 recomendada pela Google
        env:
          ACTIONS_NODE_BEFORE_WARNINGS: 'quiet'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-bigquery pytz

      - name: Executar Procedures do BigQuery
        env:
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
        run: python Update_Queries.py
