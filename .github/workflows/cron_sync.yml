name: Daily DB Sync

on:
  schedule:
    # Roda todos os dias às 08:00 UTC (05:00 da manhã no horário de Brasília)
    - cron: '0 8 * * *'
  workflow_dispatch: # Botão para rodar manualmente

jobs:
  sync:
    # Atualizado para a versão estável mais recente do servidor do GitHub
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        # Suprime os avisos de transição de versão do Node
        env:
          ACTIONS_NODE_BEFORE_WARNINGS: 'quiet'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
        env:
          ACTIONS_NODE_BEFORE_WARNINGS: 'quiet'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-bigquery supabase

      - name: Executar Script de Sincronização
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
        run: python sync.py
