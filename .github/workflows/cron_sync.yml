name: Daily DB Sync

on:
  schedule:
    # Roda todos os dias às 08:00 da madrugada (Horário UTC = 08:00 Horário de Brasília)
    - cron: '0 8 * * *'
  workflow_dispatch: # Abre o botão para você rodar manualmente e testar agora!

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-bigquery supabase

      - name: Executar Script de Sincronização
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
        run: python sync.py
